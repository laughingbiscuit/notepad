2,327.1999 L372,337.1999 L382,337.1999 L372,327.1999 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250" x="111.25" y="345.1999">How can we serve anti-vaxxers and children?</text><!--MD5=[71a0e1ed6036ae9ee57ff8958bc5f4c1]
@startuml
actor Customer as c
participant VaxClinic as v
participant DessertStall as d
c->v: Arrive for vaccine
note over c,v: Should customers order their dessert before or after vaccination?
alt Customer eats before
v->c: Vaccinate
d->c: Provide dessert
else Customer eats after
d->c: Provide dessert
v->c: Vaccinate
end
note over c,d: How can we serve anti-vaxxers and children?

@enduml

